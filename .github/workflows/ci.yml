name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  standards:
    name: Standards
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run repository standards
        run: python tools/validate.py --standards

  godot:
    name: Godot
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GODOT_VERSION: 4.6.2-stable
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Godot
        run: |
          curl -L -o /tmp/godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          chmod +x "/tmp/godot/Godot_v${GODOT_VERSION}_linux.x86_64"
          echo "GODOT_PATH=/tmp/godot/Godot_v${GODOT_VERSION}_linux.x86_64" >> "$GITHUB_ENV"

      - name: Run Godot validation
        run: python tools/validate.py --godot

  mcp:
    name: Godot MCP
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tools/godot-mcp/package-lock.json

      - name: Run MCP validation
        run: python tools/validate.py --mcp
