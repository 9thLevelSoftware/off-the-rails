# Resource Definitions
# All materials, components, consumables, and key items in the game economy.
#
# Schema:
#   id: snake_case identifier
#   name: Display name
#   category: common | structured | milestone
#   type: material | component | consumable | key_item | data
#   weight: kg per unit
#   stack_size: max per inventory slot
#   description: What this resource is
#   sources: Where to find it (location types)
#   used_for: What this resource is used for
#   rarity: common | uncommon | rare | very_rare | unique

# =============================================================================
# CARRY CAPACITY REFERENCE
# =============================================================================
# Base player capacity: 20 kg
# Scavenger bonus: +8 kg (28 kg total)
# Backpack tiers: +5 / +10 / +15 kg
# Maximum possible: 43 kg (Scavenger + Tier 3 backpack)
#
# Overencumbered penalties (over capacity):
#   1-25% over: -20% move speed
#   26-50% over: -40% move speed, no sprint
#   51%+ over: -60% move speed, no sprint, combat penalties

