# Train Upgrade Tree
# Each car has a core upgrade path (T1-T4) plus optional side branches.
#
# Schema:
#   id: snake_case identifier
#   name: Display name
#   car: Which car this upgrade belongs to
#   path: core | side
#   tier: 1-4 for core, or unlock_tier for side branches
#   description: What this upgrade does
#   effects: List of gameplay effects
#   costs: Resource requirements
#   requires: Prerequisite upgrades
#   profession_bonus: Which profession speeds/cheapens this upgrade
#
# Cost tiers reference:
#   T1: 5-10 Common
#   T2: 3-5 Common + 2-4 Structured
#   T3: 5+ Structured + 1 Milestone component
#   T4: Multiple Structured + Milestone key item
#   Side: Similar to unlock tier, slightly cheaper

# =============================================================================
# ENGINE CAR UPGRADES
# =============================================================================

engine_car:
  core:
    - id: patched_locomotion
      name: Patched Locomotion
      tier: 1
      description: Basic repairs to get the train moving. Barely functional, but mobile.
      effects:
        - Train can move between nodes
        - Base speed (slow)
        - High fuel consumption
      costs:
        scrap_metal: 8
        wiring: 4
      requires: []
      profession_bonus: engineer

    - id: reinforced_drive
      name: Reinforced Drive
      tier: 2
      description: Strengthened drivetrain and improved power transfer.
      effects:
        - +20% travel speed
        - -10% fuel consumption
      costs:
        scrap_metal: 5
        machine_parts: 3
        refined_alloys: 2
      requires: [patched_locomotion]
      profession_bonus: engineer

    - id: high_efficiency_engine
      name: High-Efficiency Engine
      tier: 3
      description: Rebuilt engine with optimized combustion and power delivery.
      effects:
        - +40% travel speed (total)
        - -25% fuel consumption (total)
        - Unlocks longer routes
      costs:
        machine_parts: 5
        refined_alloys: 4
        power_cores: 2
        engine_assembly: 1
      requires: [reinforced_drive]
      profession_bonus: engineer

    - id: command_engine
      name: Command Engine
      tier: 4
      description: Peak engineering. The train becomes a precision instrument.
      effects:
        - +60% travel speed (total)
        - -40% fuel consumption (total)
        - Unlocks endgame routes
        - Reduced breakdown chance
      costs:
        power_cores: 3
        refined_alloys: 6
        prototype_component: 1
        engine_assembly: 1
      requires: [high_efficiency_engine]
      profession_bonus: engineer

  side:
    - id: power_distributor
      name: Power Distributor
      unlock_tier: 2
      description: Expanded power grid supports more train cars.
      effects:
        - Power supports +2 additional cars
        - Smoother power distribution
      costs:
        wiring: 6
        relays: 4
        circuit_boards: 2
      requires: [patched_locomotion]
      profession_bonus: engineer

    - id: emergency_boost
      name: Emergency Boost
      unlock_tier: 2
      description: Overload the engine for a desperate burst of speed.
      effects:
        - Activate for 2x speed for 30 seconds
        - 25% chance of engine damage after use
      costs:
        machine_parts: 2
        processed_fuel: 5
      requires: [patched_locomotion]
      profession_bonus: engineer

    - id: auxiliary_generator
      name: Auxiliary Generator
      unlock_tier: 3
      description: Backup power system kicks in when main engine fails.
      effects:
        - 60 seconds of emergency power during engine failure
        - Keeps critical systems online
      costs:
        power_cores: 1
        relays: 3
        machine_parts: 3
      requires: [reinforced_drive]
      profession_bonus: engineer

    - id: overcharge_system
      name: Overcharge System
      unlock_tier: 3
      description: Sustained power boost for demanding situations.
      effects:
        - Toggle: +30% speed at +50% fuel cost
        - No damage risk (unlike Emergency Boost)
      costs:
        power_cores: 2
        circuit_boards: 4
        refined_alloys: 3
      requires: [reinforced_drive]
      profession_bonus: engineer

