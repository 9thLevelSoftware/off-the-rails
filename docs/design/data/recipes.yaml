# Crafting Recipes
# All craftable items organized by category.
#
# Schema:
#   id: snake_case identifier
#   name: Display name
#   category: consumable | ammo | medical | repair | tool | equipment | train_part | specialty
#   station: field | workshop | armory | infirmary | refinery | greenhouse | lab
#   inputs: Resource requirements {resource_id: quantity}
#   output: What is produced {item_id: quantity}
#   craft_time: Base time in seconds
#   unlock: default | schematic_common | schematic_advanced | upgrade_t2 | upgrade_t3 | upgrade_t4 | research
#   profession_bonus: Which profession gets -25% craft time
#   description: What this item does

# =============================================================================
# CONSUMABLES
# =============================================================================

consumables:
  - id: basic_bandage
    name: Basic Bandage
    category: consumable
    station: field
    inputs:
      fabric_seals: 2
    output:
      bandage: 3
    craft_time: 30
    unlock: default
    profession_bonus: medic
    description: Simple bandages for minor wounds. Stops bleeding, minor healing.

  - id: improvised_torch
    name: Improvised Torch
    category: consumable
    station: field
    inputs:
      scrap_metal: 1
      fabric_seals: 1
      chemicals: 1
    output:
      torch: 2
    craft_time: 45
    unlock: default
    profession_bonus: null
    description: Handheld light source. Burns for 10 minutes.

  - id: ration_pack
    name: Ration Pack
    category: consumable
    station: workshop
    inputs:
      rations: 3
      fabric_seals: 1
    output:
      ration_pack: 1
    craft_time: 45
    unlock: default
    profession_bonus: null
