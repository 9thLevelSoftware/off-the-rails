    category: consumable
    station: workshop
    inputs:
      chemicals: 2
      glass_ceramics: 1
    output:
      glow_stick: 4
    craft_time: 30
    unlock: default
    profession_bonus: null
    description: Chemical light. Lasts 30 minutes, can be thrown.

  - id: flare
    name: Signal Flare
    category: consumable
    station: workshop
    inputs:
      chemicals: 3
      scrap_metal: 1
    output:
      flare: 2
    craft_time: 45
    unlock: default
    profession_bonus: null
    description: Bright signal or distraction. Visible for long distances.

  - id: smoke_bomb
    name: Smoke Bomb
    category: consumable
    station: armory
    inputs:
      chemicals: 4
      fabric_seals: 2
    output:
      smoke_bomb: 2
    craft_time: 60
    unlock: schematic_common
    profession_bonus: security
